# encoding: utf-8
---
recipe:
  Rx: others/recipes/grammar
  args:
    - schema=rime_ice
  description: >-
    配置语法模型（万象）。
      - rime_ice（雾凇拼音、全拼）
      - double_pinyin（自然码双拼）
      - double_pinyin_flypy（小鹤双拼）
      - double_pinyin_mspy（微软双拼）
      - double_pinyin_sogou（搜狗双拼）
      - double_pinyin_abc（智能 ABC 双拼）
      - double_pinyin_jiajia（拼音加加双拼）
      - double_pinyin_ziguang（紫光双拼）

download_files:
  - wanxiang-lts-zh-hans.gram::https://github.com/amzxyz/RIME-LMDG/releases/download/LTS/wanxiang-lts-zh-hans.gram

install_files:
  - wanxiang-lts-zh-hans.gram

patch_files:
  ${schema:-rime_ice}.custom.yaml:
    - patch/+:
        grammar:
          language: wanxiang-lts-zh-hans
          collocation_max_length: 6
          collocation_min_length: 3
          collocation_penalty: -14
          non_collocation_penalty: -6
          weak_collocation_penalty: -100
          rear_penalty: -20
        translator/contextual_suggestions: false
        translator/max_homophones: 8
