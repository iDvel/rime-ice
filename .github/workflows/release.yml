name: Test and Release

on:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.*"
    paths:
      - "**/**"
      - "!**.md"
      - "!**.gitignore"
      - "!.github/**"
  workflow_dispatch:

jobs:
  release:
    name: Test and Release
    runs-on: ubuntu-24.04
    if: github.repository == 'iDvel/rime-ice'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Test
      - name: Install lint dependencies
        run: |
          echo "Install lint dependencies..."
          python3 -m pip install yamllint
          sudo apt install -y luarocks
          sudo luarocks install luacheck

      - name: Cache rime cli bundle
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/rime-cli-cache/rime-cli-linux-1.6.1.zip
          key: rime-cli-linux-1.6.1

      - name: Run lint
        run: make -C others/script lint

      - name: Run smoke test suite
        env:
          RIME_CLI_URL: https://github.com/mirtlecn/public/releases/download/v1.6.1/rime-cli-linux-1.6.1.zip
          RIME_CLI_CACHE_PATH: ${{ runner.temp }}/rime-cli-cache/rime-cli-linux-1.6.1.zip
        run: make -C others/script smoke

      # build
      - name: Setup Go
        if: ${{ contains(github.event.head_commit.message, ' [build]') || github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Check and build
        id: check_and_build
        if: ${{ contains(github.event.head_commit.message, ' [build]') || github.event_name == 'workflow_dispatch' }}
        run: |
          cd others/script
          go mod tidy
          go run main.go --rime_path "${{ github.workspace }}" --auto_confirm

      - name: Pack dicts
        run: |
          rm -rf dist
          mkdir dist
          echo "Pack all ..."
          find . -maxdepth 1 -name "*.lua" -o -name "*.yaml" -o -name "*.txt" | zip dist/full.zip -@
          zip -r dist/full.zip cn_dicts en_dicts lua opencc LICENSE
          echo "Pack dicts ..."
          zip -r dist/all_dicts.zip cn_dicts en_dicts opencc radical_pinyin.dict.yaml
          echo "Pack cn_dicts ..."
          zip -r dist/cn_dicts.zip cn_dicts
          echo "Pack en_dicts ..."
          zip -r dist/en_dicts.zip en_dicts
          echo "Pack opencc ..."
          zip -r dist/opencc.zip opencc
          echo "Pack binary for fcitx5.js ..."
          zip -r dist/fcitx5_rime_js-rime_ice.zip build lua opencc custom_phrase.txt

      # ---- Compile schemas for Android (rime-ice-compiled.zip) ----
      - name: Extract rime-cli bundle for compilation
        run: |
          mkdir -p /tmp/rime-cli
          # Outer zip contains a nested zip; cache is already populated by the cache step
          unzip -o "${{ runner.temp }}/rime-cli-cache/rime-cli-linux-1.6.1.zip" -d /tmp/rime-cli-outer
          unzip -o /tmp/rime-cli-outer/rime_cli-linux.zip -d /tmp/rime-cli

      - name: Prepare compilation environment
        run: |
          # Preserve rime-ice's default.yaml (will become rime_ice_suggestion.yaml)
          mv default.yaml _default.yaml

          # Link shared data from rime-cli bundle (essay.txt, etc.)
          ln -sf /tmp/rime-cli/rime_cli/share/rime-data/* .

          # Override with rime-prelude files (bundle's default.yaml lacks key_binder/punctuation references)
          for f in default.yaml key_bindings.yaml punctuation.yaml symbols.yaml; do
            rm -f "$f"
            curl -fsSL -o "$f" "https://raw.githubusercontent.com/rime/rime-prelude/master/$f"
          done

      - name: Compile schemas
        env:
          LD_LIBRARY_PATH: /tmp/rime-cli/rime_cli/lib
          RIME_SHARED_DATA_DIR: /tmp/rime-cli/rime_cli/share/rime-data
        run: |
          DEPLOYER=/tmp/rime-cli/rime_cli/bin/rime_deployer
          chmod +x "$DEPLOYER"

          # Dependency schemas (compile first)
          for schema in melt_eng radical_pinyin; do
            echo "Compiling ${schema}..."
            "$DEPLOYER" --compile "${schema}.schema.yaml"
          done
          # Main schemas
          for schema in rime_ice double_pinyin double_pinyin_abc double_pinyin_mspy double_pinyin_sogou double_pinyin_flypy double_pinyin_ziguang double_pinyin_jiajia; do
            echo "Compiling ${schema}..."
            "$DEPLOYER" --compile "${schema}.schema.yaml"
          done

      - name: Clean up and pack compiled release
        run: |
          # Remove symlinks to rime-cli bundle data
          find . -maxdepth 1 -type l -delete
          # Remove rime-prelude files (not needed on Android - rime plugin provides its own)
          rm -f default.yaml key_bindings.yaml punctuation.yaml symbols.yaml essay.txt
          # Remove debug dump files generated by rime-cli (not needed at runtime)
          find build/ -name '*.prism.txt' -delete
          # Remove files not needed on Android
          rm -f weasel.yaml squirrel.yaml installation.yaml user.yaml recipe.yaml custom_phrase.txt
          # Restore default.yaml as rime_ice_suggestion.yaml
          mv _default.yaml rime_ice_suggestion.yaml

          echo "Pack compiled ..."
          zip -r dist/rime-ice-compiled.zip \
            build/ cn_dicts/ en_dicts/ lua/ opencc/ \
            *.schema.yaml *.dict.yaml *.yaml *.txt \
            LICENSE

      - name: Create nightly release
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## 说明

            这里是每次提交后自动打包的版本，包含最新的功能和词库

            - `full.zip` : 包含所有词典和方案文件
            - `cn_dicts.zip`：中文词库
            - `en_dicts.zip`：英文词库
            - `opencc.zip`：opencc 词库（emoji 等）
            - `all_dicts.zip`：以上三个词库的整合
            - `fcitx5_rime_js-rime_ice.zip`：适用于 fcitx5-rime.js 的预构建包
            - `rime-ice-compiled.zip`：参考 archlinuxcn/rime-ice-git 创建的预构建包

          tag_name: nightly
          preserve_order: true
          name: "nightly build"
          make_latest: true
          files: |
            dist/full.zip
            dist/all_dicts.zip
            dist/cn_dicts.zip
            dist/en_dicts.zip
            dist/opencc.zip
            dist/fcitx5_rime_js-rime_ice.zip
            dist/rime-ice-compiled.zip

      - name: Create stable release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## 重要更新

            **release notes**

            ## 说明

            - `full.zip` : 包含所有词典和方案文件
            - `cn_dicts.zip`：中文词库
            - `en_dicts.zip`：英文词库
            - `opencc.zip`：opencc 词库（emoji 等）
            - `all_dicts.zip`：以上三个词库的整合
            - `fcitx5_rime_js-rime_ice.zip`：适用于 fcitx5-rime.js 的预构建包
            - `rime-ice-compiled.zip`：参考 archlinuxcn/rime-ice-git 创建的预构建包

          draft: true
          preserve_order: true
          make_latest: true
          files: |
            dist/full.zip
            dist/all_dicts.zip
            dist/cn_dicts.zip
            dist/en_dicts.zip
            dist/opencc.zip
            dist/fcitx5_rime_js-rime_ice.zip
            dist/rime-ice-compiled.zip

      - name: Push and commit
        if: ${{ steps.check_and_build.outcome == 'success' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          if ! git diff --cached --quiet; then
            COMMIT_MSG=$(git log -1 --pretty=%B | sed -e 's/\s\[build\]$//' -e 's/^[a-zA-Z()]*:\s*//')
            git commit -m "build(ci): auto build for -> ${COMMIT_MSG} <-"
            git push
          else
            echo "No changes to commit."
          fi
